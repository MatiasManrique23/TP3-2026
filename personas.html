<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Personas JavaScript
</title>


<link rel="stylesheet" href="css/estilos.css">


</head>


<body>


<h1>
Personas con JavaScript
</h1>


<a href="index.html">
Volver al inicio
</a>



<h2>
Formulario de personas
</h2>



<form id="formulario">


<input 
type="text"
id="nombre"
placeholder="Nombre"
required>


<input 
type="text"
id="apellido"
placeholder="Apellido"
required>


<input 
type="number"
id="edad"
placeholder="Edad"
required>



<input 
type="number"
step="0.01"
id="altura"
placeholder="Altura en metros"
required>



<input 
type="number"
step="0.01"
id="peso"
placeholder="Peso en kg"
required>



<button type="submit">
Agregar
</button>


</form>




<h2>
Lista de personas
</h2>




<table border="1">


<thead>

<tr>


<th>
Nombre
</th>


<th>
Apellido
</th>


<th>
Edad
</th>


<th>
Altura
</th>


<th>
Peso
</th>


<th>
IMC
</th>


<th>
Acción
</th>


</tr>


</thead>




<tbody id="tablaPersonas">


</tbody>



</table>




<script src="js/personas.js"></script>



</body>


</html>
